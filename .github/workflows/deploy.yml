name: Deploy Vite site to Pages

on:
  push:
    branches: ["main"] # Hoặc "master" tùy tên nhánh của bạn
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      # BƯỚC TỰ ĐỘNG SỬA LỖI ĐƯỜNG DẪN TRƯỚC KHI BUILD
      - name: Auto Fix Paths
        run: |
          # Tự động thêm dấu chấm vào trước /src/ trong file index.html nếu thiếu
          sed -i 's/src="\/src/src=".\/src/g' index.html
          sed -i "s/src='\/src/src='.\/src/g" index.html

      - name: Build
        # Thêm cờ --base=./ trực tiếp vào lệnh build để không cần sửa file vite.config.ts
        run: npx vite build --base=./

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
